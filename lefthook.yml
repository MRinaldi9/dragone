# EXAMPLE USAGE:
#
#   Refer for explanation to following link:
#   https://lefthook.dev/configuration/
#
assert_lefthook_installed: true
colors: true
commit-msg:
  commands:
    'lint commit message':
      run: pnpm commitlint --edit $1
      env:
        LEFTHOOK: 0
pre-commit:
  parallel: true
  jobs:
    - name: Oxlint Dragone UI staged files
      run: pnpm oxlint {staged_files} --no-error-on-unmatched-pattern
      stage_fixed: true
      glob: "*.{ts,html,css,js}"
    - name: ESLint Dragone
      run: pnpm eslint --fix -c projects/dragone/ui/eslint.config.mjs {staged_files}
      stage_fixed: true
      glob: "*.{ts,html,css,js}"
    - name: Format Dragone UI staged files
      run: pnpm run format {staged_files}
      stage_fixed: true
      glob: "*.{ts,html,css,js}"
post-commit:
  commands:
    'tokensave sync':
      run: tokensave sync
post-checkout:
  commands:
    'tokensave init':
      run: '[ "$1" = "0000000000000000000000000000000000000000" ] && tokensave init || true'
